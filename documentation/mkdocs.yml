extra_css:
- css/mkdocstrings.css
- css/extra.css


markdown_extensions:
  - pymdownx.snippets:
      base_path: ".."
      check_paths: false

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format

  - pymdownx.highlight
  - pymdownx.details
  - admonition
  - mkdocs_graphviz
  - pymdownx.arithmatex:
      generic: true


plugins:
  - search
  #- codeinclude:
  #    title_mode: none
  - mermaid2
  - mkdocstrings:
      handlers:
        python:
          paths: [../betfsm, ../betfsm_demos, ../betfsm_ros, ../betfsm_crospi,..]
          options: 
            show_source: false
            show_root_heading: true 
            docstring_style: google



extra_javascript:
  - https://cdn.jsdelivr.net/gh/rod2ik/cdn@main/mkdocs/javascripts/mkdocs-graphviz.js
  - https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS_HTML

#  - javascripts/mathjaxhelper.js
