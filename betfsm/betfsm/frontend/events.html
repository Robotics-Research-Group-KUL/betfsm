<script>
    // Adjust this base URL if your FastAPI backend runs on a different port/host
    const BASE_URL = window.location.origin === 'null' ? 'http://localhost:8000' : window.location.origin;
    
    const buttonsContainer = document.getElementById('buttons-container');
    const statusPanel = document.getElementById('status-panel');

    // Helper to log state to our custom window console
    function logStatus(message, type = '') {
        statusPanel.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        statusPanel.className = ''; // reset classes
        if (type === 'success') statusPanel.classList.add('status-success');
        if (type === 'error') statusPanel.classList.add('status-error');
    }

    // Function to POST the specific event back to the server
    async function triggerEvent(eventName, buttonElement) {
        buttonElement.disabled = true;
        logStatus(`Sending event: ${eventName}...`);

        const payload = {
            channel: "betfsm", // Matches FastAPI schema default
            event: eventName
        };

        try {
            const response = await fetch(`${BASE_URL}/api/event`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                logStatus(`Success! Event "${eventName}" delivered.`, 'success');
            } else {
                const errData = await response.json().catch(() => ({}));
                logStatus(`Error ${response.status}: ${JSON.stringify(errData.detail || 'Unknown validation error')}`, 'error');
            }
        } catch (error) {
            logStatus(`Network error: Could not reach backend at ${BASE_URL}`, 'error');
            console.error(error);
        } finally {
            buttonElement.disabled = false;
        }
    }

    // Fetch the list of allowed events and build out the control UI dynamically
    async function initializeUI() {
        try {
            const response = await fetch(`${BASE_URL}/api/event_list`);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const data = await response.json();
            const httpEvents = data.httpevent || [];

            if (httpEvents.length === 0) {
                buttonsContainer.innerHTML = '<p style="color: var(--error-color);">No events found under "httpevent".</p>';
                return;
            }

            // Wipe out loading indicator
            buttonsContainer.innerHTML = '';

            // Generate a button element for every event in the array
            httpEvents.forEach(eventName => {
                const btn = document.createElement('button');
                btn.className = 'btn success';
                btn.textContent = eventName.replace('_', ' '); // pretty printing clean labels
                btn.addEventListener('click', () => triggerEvent(eventName, btn));
                buttonsContainer.appendChild(btn);
            });

            logStatus("Event dashboard populated successfully.");

        } catch (error) {
            logStatus(`Initialization Failed: Failed to pull event mapping from /api/event_list.`, 'error');
            buttonsContainer.innerHTML = '<p style="color: var(--error-color);">Could not fetch schema items. Make sure your FastAPI server is active.</p>';
            console.error(error);
        }
    }

    // Fire off initialization routine on window DOM build
    window.addEventListener('DOMContentLoaded', initializeUI);
</script>
